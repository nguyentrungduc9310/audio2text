services:
  app:
    build: .
    ports:
      - "8501:8501"
    environment:
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - whisper-models:/root/.cache/huggingface/hub

  # Full Docker mode only (Linux/CI)
  ollama:
    image: ollama/ollama:latest
    profiles: ["full"]
    volumes:
      - ollama-data:/root/.ollama

  ollama-init:
    image: ollama/ollama:latest
    profiles: ["full"]
    entrypoint: ["/bin/sh", "-c", "until ollama list >/dev/null 2>&1; do sleep 2; done && ollama pull qwen3.5:4b"]
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - ollama
    restart: "no"

volumes:
  whisper-models:
  ollama-data:
